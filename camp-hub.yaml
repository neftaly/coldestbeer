# ============================================================
# CAMP HUB - ESP32-C6
#
# BLE sensors: 1x JK-BMS + Alpicool fridge
# WiFi connected to HA
# E-ink display + LoRa radio to be added later
# ============================================================

substitutions:
  name: camp-hub
  friendly_name: "Camp Hub"
  bms_name: "Battery"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name}-fallback"
    password: "esphome123"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- BLE tracker + client ---
esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret bms1_mac_address
    id: ble_bms
  - mac_address: !secret fridge_mac_address
    id: ble_fridge

# --- External components ---
external_components:
  - source: github://syssi/esphome-jk-bms@main
    refresh: 0s
  - source: github://neftaly/esphome-alpicool@main
    refresh: 0s

jk_bms_ble:
  - ble_client_id: ble_bms
    protocol_version: JK02_32S
    throttle: 5s
    id: bms

alpicool_ble:
  - ble_client_id: ble_fridge
    throttle: 10s
    id: fridge

# --- Sensors ---
sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms
    state_of_charge:
      name: "${bms_name} SOC"
    total_voltage:
      name: "${bms_name} Voltage"
    current:
      name: "${bms_name} Current"
    power:
      name: "${bms_name} Power"
    min_cell_voltage:
      name: "${bms_name} Min Cell V"
    max_cell_voltage:
      name: "${bms_name} Max Cell V"
    delta_cell_voltage:
      name: "${bms_name} Delta Cell V"
    temperature_sensor_1:
      name: "${bms_name} Temp 1"
    temperature_sensor_2:
      name: "${bms_name} Temp 2"
    power_tube_temperature:
      name: "${bms_name} MOSFET Temp"
    capacity_remaining:
      name: "${bms_name} Capacity Remaining"
    charging_cycles:
      name: "${bms_name} Cycles"

  - platform: alpicool_ble
    alpicool_ble_id: fridge
    current_temperature:
      name: "Fridge Temperature"
    target_temperature:
      name: "Fridge Target"
    battery_percent:
      name: "Fridge Battery"
    battery_voltage:
      name: "Fridge Battery Voltage"

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

binary_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms
    charging:
      name: "${bms_name} Charging"
    discharging:
      name: "${bms_name} Discharging"
    balancing:
      name: "${bms_name} Balancing"
    online_status:
      name: "${bms_name} Online"

  - platform: alpicool_ble
    alpicool_ble_id: fridge
    powered_on:
      name: "Fridge Powered On"
    controls_locked:
      name: "Fridge Controls Locked"

climate:
  - platform: alpicool_ble
    alpicool_ble_id: fridge
    name: "Fridge"

select:
  - platform: alpicool_ble
    alpicool_ble_id: fridge
    run_mode:
      name: "Fridge Run Mode"
    battery_saver:
      name: "Fridge Battery Protection"

switch:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms
    charging:
      name: "${bms_name} Enable Charging"
    discharging:
      name: "${bms_name} Enable Discharging"
    balancer:
      name: "${bms_name} Enable Balancer"

  - platform: alpicool_ble
    alpicool_ble_id: fridge
    power:
      name: "Fridge Power"
    controls_lock:
      name: "Fridge Controls Lock"

text_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms
    errors:
      name: "${bms_name} Errors"
